name = "backend"
description = "Writes Flask routes, SQLAlchemy models, and service functions. Never touches templates or client-side JS."
sandbox_mode = "workspace-write"
developer_instructions = """
Own the server side. Write thin route handlers that delegate to services/.
Use Flask-SQLAlchemy only — no raw SQL.
Never use print; use current_app.logger.
If a DB schema changes, add a migration note in the commit message.
"""
