name: Codex release notes

# Runs when you push a tag matching v* (e.g. v0.2.0).
# Trigger manually with: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create a branch and push the CHANGELOG commit
  pull-requests: write   # open the PR

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          # approval policy goes via codex-args, not a dedicated input
          codex-args: --ask-for-approval never
          prompt: |
            You are generating release notes for tag ${{ github.ref_name }}.

            Steps:
            1. Find the previous tag with: git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo FIRST
               (If the output is FIRST, compare against the repository's initial commit.)
            2. Produce a human-readable summary of changes between that previous ref and ${{ github.ref_name }}.
            3. Prepend a new entry to CHANGELOG.md at the top, formatted like:
               ## ${{ github.ref_name }} — YYYY-MM-DD
               ### Added
               - ...
               ### Changed
               - ...
               ### Fixed
               - ...
               ### Removed
               - ...
               (Omit empty sections. Only include user-visible changes.)
            4. Create and check out a branch named release-notes/${{ github.ref_name }}.
            5. git add CHANGELOG.md && git commit -m "docs: release notes for ${{ github.ref_name }}"
            6. git push origin release-notes/${{ github.ref_name }}
            7. Use the gh CLI to open a PR: gh pr create --base main --head release-notes/${{ github.ref_name }} --title "Release notes for ${{ github.ref_name }}" --body "Auto-generated by Codex on tag push."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
