name: Codex release notes

# Fires only when a version tag (v*) is pushed.
# Trigger: git tag v0.2.0 -m "..." && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create a branch and push the CHANGELOG commit
  pull-requests: write   # open the PR

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          codex-args: --ask-for-approval never
          prompt: |
            Generate release notes for tag ${{ github.ref_name }}.

            1. Find the previous tag:
               git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo FIRST
               If FIRST, compare against the initial commit.
            2. Summarize user-visible changes between that ref and ${{ github.ref_name }}.
            3. Prepend to CHANGELOG.md at the top:
               ## ${{ github.ref_name }} — YYYY-MM-DD
               ### Added / Changed / Fixed / Removed   (omit empty sections)
            4. Create branch release-notes/${{ github.ref_name }}, commit CHANGELOG.md,
               push it, and open a PR to main with title "Release notes for ${{ github.ref_name }}".

            Never commit to main directly. Never edit files outside CHANGELOG.md.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
